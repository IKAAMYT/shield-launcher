name: Build AlterCOD Launcher

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer Qt6 via aqt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 6.8.1 win64_msvc2022_64 --outputdir C:\Qt
          Write-Host "Qt installe"

      - name: Copier Qt6 dans deps/qt6
        shell: pwsh
        run: |
          $qt = "C:\Qt\6.8.1\msvc2022_64"
          New-Item -ItemType Directory -Force -Path deps/qt6 | Out-Null
          Copy-Item "$qt\include" deps/qt6/include -Recurse -Force
          Copy-Item "$qt\lib"     deps/qt6/lib     -Recurse -Force
          Copy-Item "$qt\bin"     deps/qt6/bin     -Recurse -Force
          Write-Host "Qt copie"

      - name: Ajouter MSBuild au PATH
        uses: microsoft/setup-msbuild@v2

      - name: Generer le projet Visual Studio (premake5)
        shell: cmd
        run: tools\premake5.exe vs2022

      - name: Compiler en Release x64
        shell: cmd
        run: msbuild build\Shield_launcher.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Preparer le dossier de sortie (les 2 exe + DLL Qt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          # Recupere TOUT le dossier Release (contient Shield_Launcher.exe ET Launch Project BO4.exe)
          $releaseDir = Get-ChildItem -Recurse -Path build -Directory |
                        Where-Object { $_.FullName -match 'Release' -and $_.Name -eq 'Release' } |
                        Select-Object -First 1
          if (-not $releaseDir) {
            $releaseDir = Get-ChildItem -Recurse -Path build -Directory |
                          Where-Object { $_.FullName -match 'bin.*Release' } | Select-Object -First 1
          }
          Write-Host "Dossier Release : $($releaseDir.FullName)"
          Get-ChildItem $releaseDir.FullName | ForEach-Object { Write-Host "  - $($_.Name)" }
          # copie tous les exe trouves
          Get-ChildItem -Recurse -Path build -Filter *.exe |
            Where-Object { $_.FullName -match 'Release' } |
            ForEach-Object { Copy-Item $_.FullName artifact/ -Force; Write-Host "EXE copie: $($_.Name)" }
          # copie les DLL Qt
          Copy-Item deps/qt6/bin/Qt6Core.dll, deps/qt6/bin/Qt6Gui.dll, deps/qt6/bin/Qt6Widgets.dll, deps/qt6/bin/Qt6Network.dll artifact/ -Force -ErrorAction SilentlyContinue
          # plugins plateforme (necessaires pour l'affichage Qt)
          New-Item -ItemType Directory -Force -Path artifact/platforms | Out-Null
          Copy-Item deps/qt6/plugins/platforms/qwindows.dll artifact/platforms/ -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path "deps/qt6/plugins/platforms/qwindows.dll")) {
            # certains layouts mettent plugins ailleurs
            $qwin = Get-ChildItem -Recurse -Path "C:\Qt" -Filter qwindows.dll | Select-Object -First 1
            if ($qwin) { Copy-Item $qwin.FullName artifact/platforms/ -Force }
          }
          Write-Host "Contenu final de artifact/ :"
          Get-ChildItem -Recurse artifact | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: AlterCOD-Launcher
          path: artifact/
