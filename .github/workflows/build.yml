name: Build AlterBO4 Launcher

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer Qt6 via aqt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 6.8.1 win64_msvc2022_64 --outputdir C:\Qt
          Write-Host "Qt installe"

      - name: Copier Qt6 dans deps/qt6
        shell: pwsh
        run: |
          $qt = "C:\Qt\6.8.1\msvc2022_64"
          New-Item -ItemType Directory -Force -Path deps/qt6 | Out-Null
          Copy-Item "$qt\include" deps/qt6/include -Recurse -Force
          Copy-Item "$qt\lib"     deps/qt6/lib     -Recurse -Force
          Copy-Item "$qt\bin"     deps/qt6/bin     -Recurse -Force

      - name: Telecharger Discord RPC (lib precompilee)
        shell: pwsh
        run: |
          $url = "https://github.com/discord/discord-rpc/releases/download/v3.4.0/discord-rpc-win.zip"
          Invoke-WebRequest -Uri $url -OutFile discord-rpc-win.zip
          Expand-Archive discord-rpc-win.zip -DestinationPath discord-rpc-tmp -Force
          New-Item -ItemType Directory -Force -Path deps/discord-rpc/include | Out-Null
          New-Item -ItemType Directory -Force -Path deps/discord-rpc/lib | Out-Null
          # Le zip contient win64-dynamic/ et win64-static-release/ etc.
          Write-Host "Contenu extrait :"
          Get-ChildItem -Recurse discord-rpc-tmp | Select-Object FullName
          # headers
          Copy-Item discord-rpc-tmp/*/include/*.h deps/discord-rpc/include/ -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse discord-rpc-tmp -Filter *.h | ForEach-Object { Copy-Item $_.FullName deps/discord-rpc/include/ -Force }
          # lib + dll (on prend la version dynamique win64)
          Get-ChildItem -Recurse discord-rpc-tmp -Filter discord-rpc.lib | ForEach-Object { Copy-Item $_.FullName deps/discord-rpc/lib/ -Force }
          Get-ChildItem -Recurse discord-rpc-tmp -Filter discord-rpc.dll | ForEach-Object { Copy-Item $_.FullName deps/discord-rpc/lib/ -Force }
          Write-Host "Discord RPC installe :"
          Get-ChildItem -Recurse deps/discord-rpc | Select-Object FullName

      - name: Ajouter MSBuild au PATH
        uses: microsoft/setup-msbuild@v2

      - name: Generer le projet (premake5)
        shell: cmd
        run: tools\premake5.exe vs2022

      - name: Compiler en Release x64
        shell: cmd
        run: msbuild build\Shield_launcher.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Preparer la sortie
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Get-ChildItem -Recurse -Path build -Filter *.exe |
            Where-Object { $_.FullName -match 'Release' } |
            ForEach-Object { Copy-Item $_.FullName artifact/ -Force; Write-Host "EXE: $($_.Name)" }
          Copy-Item deps/qt6/bin/Qt6Core.dll, deps/qt6/bin/Qt6Gui.dll, deps/qt6/bin/Qt6Widgets.dll, deps/qt6/bin/Qt6Network.dll artifact/ -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path artifact/platforms | Out-Null
          $qwin = Get-ChildItem -Recurse -Path "C:\Qt" -Filter qwindows.dll | Select-Object -First 1
          if ($qwin) { Copy-Item $qwin.FullName artifact/platforms/ -Force }
          # DLL Discord RPC (necessaire au lancement)
          Copy-Item deps/discord-rpc/lib/discord-rpc.dll artifact/ -Force -ErrorAction SilentlyContinue
          Write-Host "Contenu artifact :"
          Get-ChildItem -Recurse artifact | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: AlterBO4-Launcher
          path: artifact/
